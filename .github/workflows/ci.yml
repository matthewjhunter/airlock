name: CI

# Thin caller: Go CI (test/vet/fmt/lint/govulncheck) lives in
# infodancer/workflows so the definition + action pins stay identical across
# repos. See that repo's README.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: infodancer/workflows/.github/workflows/go-ci.yml@v0
    # GitHub-hosted, not the self-hosted homelab pool (the workflow's default):
    # this is a small pure-Go public library with no special build needs, and
    # ubuntu-latest also runs on outside contributors' pull requests.
    with:
      runner: '["ubuntu-latest"]'
      # Build/test/vet/lint run on the module's low go.mod floor (1.22). But
      # govulncheck@latest itself now requires Go >= 1.25 to build, so give the
      # scanner job a newer toolchain without raising the library's floor.
      govulncheck_go_version: "1.26.5"
